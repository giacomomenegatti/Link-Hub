<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Standard -->
    <title>Giacomo Menegatti</title>
    <meta name="description" content="Graphic Designer basato a Genova. Selezione di collegamenti personali e portfolio professionale.">
    <meta name="author" content="Giacomo Menegatti">
    
    <!-- Open Graph / Meta tag per la condivisione Social -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Giacomo Menegatti">
    <meta property="og:description" content="Graphic Designer basato a Genova. Selezione di collegamenti personali e portfolio professionale.">
    <meta property="og:image" content="https://giacomomenegatti.github.io/Link-Hub/social-preview.jpg">

    <!-- Favicon e Apple Touch Icon -->
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <style>
        /* Importazione del font Satoshi */
        @import url('https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap');

        /* Palette Coerente con il Portfolio */
        :root {
            --bg-color: #e6e6e6;       /* Hub: Grigio chiaro */
            --text-color: #333333;     /* Hub: Antracite */
            --accent-color: #707070;   /* Hub: Grigio medio */
            --border-color: #333333;   
            --card-active-bg: #333333;
            --card-active-text: #e6e6e6;
            --font-main: 'Satoshi', sans-serif;

            /* INTRO INVERTITA */
            --intro-bg: #333333;       
            --intro-text: #e6e6e6;     
        }

        /* Dark Mode Automatica */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #333333;       /* Hub: Antracite */
                --text-color: #e6e6e6;     /* Testo Grigio Chiaro */
                --accent-color: #a0a0a0;   
                --border-color: #e6e6e6;   
                --card-active-bg: #e6e6e6;
                --card-active-text: #333333;

                /* INTRO INVERTITA */
                --intro-bg: #e6e6e6;       
                --intro-text: #333333;     
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* --- INTRO EFFETTO SIPARIO --- */
        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--intro-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transform: translateY(0);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #intro-screen.slide-up {
            transform: translateY(-100%);
        }

        .intro-text {
            color: var(--intro-text);
            font-size: 24px;            
            font-weight: 700;           
            letter-spacing: -0.03em;    
            opacity: 0;
            transform: translateY(24px); 
            animation: ciaoIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes ciaoIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- HUB PRINCIPALE --- */
        .wrapper {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
        }

        /* Header Area */
        .header {
            margin-bottom: 48px;
            text-align: left;
            padding-top: 12px;
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--accent-color);
            font-weight: 400;
            letter-spacing: -0.01em;
        }

        /* Sezione Links */
        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 32px;
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            border-radius: 9999px;
            
            transition: background-color 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                        color 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                        transform 0.3s cubic-bezier(0.16, 1, 0.3, 1),
                        border-color 0.4s ease;
        }

        .link-card .arrow {
            font-size: 16px;
            display: inline-block;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Hover States */
        .link-card:hover {
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        .link-card:hover .arrow {
            transform: translateX(6px);
        }

        /* Click State */
        .link-card:active {
            transform: scale(0.96);
            background-color: var(--card-active-bg);
            color: var(--card-active-text);
            transition: transform 0.08s ease;
        }

        /* Focus per accessibilità */
        .link-card:focus {
            outline: none;
        }

        .link-card:focus-visible {
            outline: 2px solid var(--border-color);
            outline-offset: 4px;
        }

        /* Footer */
        .footer {
            margin-top: 64px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent-color);
            border-top: 1px solid var(--border-color);
            opacity: 0.5;
            padding-top: 16px;
        }
    </style>
</head>
<body>

    <!-- Sipario di Intro -->
    <div id="intro-screen">
        <div class="intro-text">ciao</div>
    </div>

    <!-- Hub Principale -->
    <div class="wrapper">
        <header class="header">
            <h1 class="title">Giacomo Menegatti</h1>
            <p class="subtitle">Graphic Designer</p>
        </header>

        <nav class="nav-links">
            <a href="#" target="_blank" class="link-card">
                <span>Portfolio</span>
                <span class="arrow">→</span>
            </a>

            <a href="https://www.instagram.com/giacomo_menegatti" target="_blank" class="link-card">
                <span>Instagram</span>
                <span class="arrow">→</span>
            </a>
            
            <a href="https://www.behance.net/giacomomenegatti" target="_blank" class="link-card">
                <span>Behance</span>
                <span class="arrow">→</span>
            </a>
            
            <a href="https://www.linkedin.com/in/giacomo-menegatti-80872a224" target="_blank" class="link-card">
                <span>LinkedIn</span>
                <span class="arrow">→</span>
            </a>
        </nav>

        <footer class="footer">
            <span>© 2026 Link Hub</span>
            <span>Genova</span>
        </footer>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const intro = document.getElementById('intro-screen');
                intro.classList.add('slide-up');
                setTimeout(() => intro.remove(), 500);
            }, 500);
        });
    </script>

</body>
</html>
